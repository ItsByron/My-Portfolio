<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>

    <!-- Bootstrap 4 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #040e24;
            --cyan: #00e5ff;
            --cyan-glow: rgba(0, 229, 255, 0.3);
            --text-light: #c8deff;
            --text-muted: #6a8aad;
            --grid-color: rgba(0, 180, 204, 0.07);
        }

        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
            animation: gridFlow 3s linear infinite;
        }

        @keyframes gridFlow {
            0%   { background-position: 0 0; }
            100% { background-position: 80px 40px; }
        }

        .navbar {
            background: rgba(4, 14, 36, 0.95);
            border-bottom: 1px solid rgba(0, 229, 255, 0.15);
            padding: 0.75rem 2rem;
            position: relative;
            z-index: 100;
        }

        .navbar::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            filter: blur(1px);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            flex-shrink: 0;
        }

        .nav-brand:hover {
            text-decoration: none;
        }

        .brand-icon {
            width: 44px;
            height: 44px;
            border: 2px solid var(--cyan);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            color: var(--cyan);
            font-size: 1.2rem;
            box-shadow: 0 0 12px var(--cyan-glow),
                        inset 0 0 8px rgba(0, 229, 255, 0.1);
        }

        .myname {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--cyan);
            letter-spacing: 2px;
            line-height: 1;
        }

        .mytagline {
            font-size: 0.6rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            font-family: 'Share Tech Mono', monospace;
            margin-top: 3px;
        }

        .navbar-nav .nav-link {
            color: var(--text-light) !important;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 1px;
            padding: 0.5rem 1.2rem !important;
            position: relative;
            transition: color 0.3s;
        }

        .navbar-nav .nav-link:hover {
            color: var(--cyan) !important;
        }

        .navbar-nav .nav-link.active {
            color: var(--cyan) !important;
        }

        .navbar-nav .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: 0px;
            left: 1.2rem;
            right: 1.2rem;
            height: 2px;
            background: var(--cyan);
            box-shadow: 0 0 8px var(--cyan);
            border-radius: 2px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-4">

        <!-- Brand LEFT — outside collapse -->
        <a class="nav-brand" href="#">
            <div class="brand-icon">B</div>
            <div class="brand-text">
                <div class="myname">Lord Byron H. Saguid</div>
                <div class="mytagline">LET'S SEE THE AWESOME EXPERIENCE</div>
            </div>
        </a>

        <!-- Mobile Toggle — BS4 uses data-toggle -->
        <button class="navbar-toggler border-0 ml-auto" type="button"
                data-toggle="collapse"
                data-target="#navMenu">
            <i class="fa fa-bars" style="color: var(--cyan);"></i>
        </button>

        <!-- Collapsible links -->
        <div class="collapse navbar-collapse" id="navMenu">

            <!-- ml-auto pushes links to the right in BS4 -->
            <ul class="navbar-nav ml-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link active" href="#">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Projects</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Certificate</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Contact</a>
                </li>
            </ul>

        </div>
    </div>
</nav>

    <!-- jQuery + Bootstrap 4 JS (required) -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Active link switcher
        $('.navbar-nav .nav-link').on('click', function () {
            $('.navbar-nav .nav-link').removeClass('active');
            $(this).addClass('active');
        });
    </script>

</body>
</html>
